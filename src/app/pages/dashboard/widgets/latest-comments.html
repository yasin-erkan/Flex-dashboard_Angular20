<div class="latest-comments-container">
  <div class="comments-list">
    @for (comment of comments; track comment.id) {
    <div class="comment-item">
      <div class="comment-header">
        <div class="user-info">
          <div class="avatar" [style.background-color]="getSentimentColor(comment.isPositive)">
            {{ getInitials(comment.user) }}
          </div>
          <div class="user-details">
            <span class="username">{{ comment.user }}</span>
            <span class="video-title">{{ comment.video }}</span>
          </div>
        </div>
        <div class="comment-meta">
          <span class="time">{{ comment.time }}</span>
          <mat-icon
            [class]="comment.isPositive ? 'sentiment-positive' : 'sentiment-negative'"
            [style.color]="getSentimentColor(comment.isPositive)"
          >
            {{ getSentimentIcon(comment.isPositive) }}
          </mat-icon>
        </div>
      </div>

      <div class="comment-content">
        <p>{{ comment.comment }}</p>
      </div>

      <div class="comment-footer">
        <button mat-icon-button class="like-button">
          <mat-icon>thumb_up</mat-icon>
          <span>{{ comment.likes }}</span>
        </button>
        <button mat-icon-button class="reply-button">
          <mat-icon>reply</mat-icon>
        </button>
      </div>
    </div>
    }

    <div class="button-overlay">
      <button mat-stroked-button class="view-all-button" (click)="onViewAllComments()">
        View All Comments
        <mat-icon>arrow_forward</mat-icon>
      </button>
    </div>
  </div>
</div>
