<div class="traffic-sources-container">
  <div class="table-container">
    <table mat-table [dataSource]="dataSource" class="traffic-table">
      <ng-container matColumnDef="source">
        <th mat-header-cell *matHeaderCellDef style="width: 25%">Source</th>
        <td mat-cell *matCellDef="let element" style="width: 25%">
          <div class="source-cell">
            <span class="source-name">{{ element.source }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="visitors">
        <th mat-header-cell *matHeaderCellDef style="width: 25%">Visitors</th>
        <td mat-cell *matCellDef="let element" style="width: 25%">
          <span class="visitors">{{ element.visitors.toLocaleString() }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="percentage">
        <th mat-header-cell *matHeaderCellDef style="width: 35%">%</th>
        <td mat-cell *matCellDef="let element" style="width: 35%">
          <div class="percentage-container">
            <div class="percentage-bar">
              <div class="percentage-fill" [style.width.%]="element.percentage"></div>
            </div>
            <span class="percentage-text">{{ element.percentage }}%</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="trend">
        <th mat-header-cell *matHeaderCellDef style="width: 15%">Trend</th>
        <td mat-cell *matCellDef="let element" style="width: 15%">
          <mat-icon
            [class]="element.trend === 'up' ? 'trend-up' : 'trend-down'"
            [style.color]="getTrendColor(element.trend)"
          >
            {{ getTrendIcon(element.trend) }}
          </mat-icon>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <div class="button-overlay">
      <button mat-stroked-button class="view-all-button" (click)="onViewAllSources()">
        See more
      </button>
    </div>
  </div>
</div>
