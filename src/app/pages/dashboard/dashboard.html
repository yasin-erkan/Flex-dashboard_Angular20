<div class="header">
  <h2>Dashboard Channel</h2>
  <div class="header-buttons">
    <button mat-raised-button [mat-menu-trigger-for]="widgetMenu">
      <mat-icon>add_circle</mat-icon>
      <span>Add Widget</span>
    </button>
  </div>
  <mat-menu #widgetMenu="matMenu">
    @for (widget of store.widgetsToAdd(); track widget.id) {
    <button mat-menu-item (click)="store.addWidget(widget)">{{ widget.label }}</button>
    } @empty { <button mat-menu-item>No widgets to add</button> }
  </mat-menu>
</div>

<div class="dashboard-widgets" cdkDropList (cdkDropListDropped)="drop($event)">
  @for (widget of store.addedWidgets(); track widget.id) {
  <app-widget [data]="widget" />
  }
</div>
